[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    "src/font-end/demo",
    "__pycache__",
    ".venv",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line-too-long (handled by black)
    "F401",   # unused-import (some gui files use star imports intentionally)
]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    \.venv
  | __pycache__
  | src/font-end/demo
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
